<!-- main container for login page -->
<div class="container">

  <!-- application title -->
  <h1>CAR RENTAL MANAGEMENT SYSTEM</h1>

  <!-- login instruction -->
  <p class="sub">Please enter your user and password!</p>

  <!-- login form -->
  <form [formGroup]="itemForm" (ngSubmit)="onLogin()">

    <!-- username field -->
    <label>Username</label>
    <input type="text" formControlName="username" placeholder="name@example.com" />
    <p
      class="error"
      *ngIf="itemForm.controls['username'].touched && itemForm.controls['username'].invalid"
    >
      Please enter username.
    </p>

    <!-- password field -->
    <label>Password</label>
    <input type="password" formControlName="password" placeholder="*******" />

    <!-- password validation message -->
    <p
      class="error"
      *ngIf="itemForm.controls['password'].touched && itemForm.controls['password'].errors"
    >
      <span *ngIf="itemForm.controls['password'].errors['required']">
        Password is required.
      </span><br />

      <span *ngIf="itemForm.controls['password'].errors['pattern']">
        Password must be at least 8 characters, with one capital letter,
        one number and one special character.
      </span>
    </p>

    <!-- submit login -->
    <button type="submit">Login</button>

    <!-- api error message -->
    <p class="api-error" *ngIf="showError">{{ errorMessage }}</p>

  </form>

  <!-- redirect to registration -->
  <p class="bottom-text">
    Don't have an account?
    <a routerLink="/registration">Registration</a>
  </p>

</div>
