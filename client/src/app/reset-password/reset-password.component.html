Valid<div class="otp-shell">
  <div class="otp-card">
    <h1>Reset Password</h1>
    <p class="sub">Enter OTP and your new password.</p>

    <form [formGroup]="form" (ngSubmit)="onReset()">

      <!-- EMAIL -->
      <div class="field">
        <label>Email</label>
        <input type="email"
               formControlName="email"
               readonly
               [class.invalid]="form.controls['email'].touched && form.controls['email'].invalid">

        <small *ngIf="form.controls['email'].touched && form.controls['email'].errors?.['required']">
          Email is required
        </small>

        <small *ngIf="form.controls['email'].touched && form.controls['email'].errors?.['email']">
          Enter a valid email
        </small>
      </div>

      <!-- OTP -->
      <div class="field">
        <label>OTP</label>
        <input type="text"
               formControlName="otp"
               placeholder="Enter OTP"
               [class.invalid]="form.controls['otp'].touched && form.controls['otp'].invalid">

        <small *ngIf="form.controls['otp'].touched && form.controls['otp'].errors?.['required']">
          OTP is required
        </small>
      </div>

      <!-- NEW PASSWORD -->
      <div class="field">
        <label>New Password</label>
        <input type="password"
               formControlName="newPassword"
               placeholder="Enter new password"
               [class.invalid]="form.controls['newPassword'].touched && form.controls['newPassword'].invalid">

        <!-- REQUIRED -->
        <small *ngIf="form.controls['newPassword'].touched && form.controls['newPassword'].errors?.['required']">
          Password is required
        </small>

        <!-- PATTERN -->
        <small *ngIf="form.controls['newPassword'].touched && form.controls['newPassword'].errors?.['pattern']">
          Must contain 1 uppercase, 1 number, 1 special character and be at least 8 characters
        </small>
      </div>

      <!-- BUTTON -->
      <button class="btn" type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Updating...' : 'RESET PASSWORD' }}
      </button>

      <!-- MESSAGE -->
      <div class="msg" *ngIf="showMessage">
        {{ message }}
      </div>

    </form>
  </div>
</div>
