<!-- main container for payment report -->
<div class="container">

  <!-- page title -->
  <h2>Payment Report</h2>

  <!-- payment report table -->
  <table>
    <thead>
      <tr>
        <!-- payment id -->
        <th>Payment ID</th>

        <!-- booking id -->
        <th>Booking ID</th>

        <!-- payment amount -->
        <th>Amount</th>

        <!-- payment date -->
        <th>Date</th>

        <!-- payment method -->
        <th>Method</th>

        <!-- payment status -->
        <th>Status</th>
      </tr>
    </thead>

    <tbody>
      <!-- iterate over payment report list -->
      <tr *ngFor="let p of bookingList">
        <td>{{ p.id }}</td>
        <td>{{ p.bookingId }}</td>
        <td>{{ p.amount }}</td>
        <td>{{ p.paymentDate }}</td>
        <td>{{ p.paymentMethod }}</td>
        <td>{{ p.paymentStatus }}</td>
      </tr>
    </tbody>
  </table>

  <!-- error message -->
  <p class="error" *ngIf="showError">{{ errorMessage }}</p>
</div>
