<div class="otp-shell">
  <div class="otp-card">
    <h1>Forgot Password</h1>
    <p class="sub">Enter your registered email to receive an OTP.</p>

    <form [formGroup]="form" (ngSubmit)="onSendOtp()">

      <div class="field">
        <label>Email</label>
        <input type="email"
               formControlName="email"
               placeholder="Enter your email"
               [class.invalid]="form.controls['email'].touched && form.controls['email'].invalid">
        <small *ngIf="form.controls['email'].touched && form.controls['email'].invalid">Valid email is required</small>
      </div>

      <button class="btn" type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Sending...' : 'SEND OTP' }}
      </button>

      <div class="msg" *ngIf="showMessage">{{ message }}</div>

    </form>
  </div>
</div>
