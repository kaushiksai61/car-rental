<div class="otp-shell">
  <div class="otp-card">
    <h1>Verify Email OTP</h1>
    <p class="sub">Enter the OTP sent to your email to activate your account.</p>

    <form [formGroup]="form" (ngSubmit)="onVerify()">

      <div class="field">
        <label>Email</label>
        <input type="email"
               formControlName="email"
               placeholder="Enter your email"
               [class.invalid]="form.controls['email'].touched && form.controls['email'].invalid">
        <small *ngIf="form.controls['email'].touched && form.controls['email'].invalid">Valid email is required</small>
      </div>

      <div class="field">
        <label>OTP</label>
        <input type="text"
               formControlName="otp"
               placeholder="Enter OTP"
               [class.invalid]="form.controls['otp'].touched && form.controls['otp'].invalid">
        <small *ngIf="form.controls['otp'].touched && form.controls['otp'].invalid">OTP is required</small>
      </div>

      <button class="btn" type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Verifying...' : 'VERIFY OTP' }}
      </button>

      <button class="btn secondary" type="button" (click)="onResend()" [disabled]="isLoading">
        Resend OTP
      </button>

      <div class="msg" *ngIf="showMessage">
        {{ message }}
      </div>

    </form>
  </div>
</div>
